services:
  - type: web
    name: devforge-universal-backend
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=packages:. uvicorn backend_core.universal_main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: POLAR_SERVER
        sync: false
      - key: POLAR_API_URL
        sync: false
      - key: POLAR_ACCESS_TOKEN
        sync: false
      - key: POLAR_WEBHOOK_SECRET
        sync: false
      - key: POLAR_PRODUCT_ID_FILECLEANER
        sync: false
      - key: POLAR_PRODUCT_ID_INVOICEFOLLOW
        sync: false
      - key: POLAR_PRODUCT_ID_PRICETRACKR
        sync: false
      - key: POLAR_PRODUCT_ID_WEBHOOKMONITOR
        sync: false
      - key: POLAR_PRODUCT_ID_FEEDBACKLENS
        sync: false
      - key: POLAR_PRODUCT_ID_FILECLEANER_PRO
        sync: false
      - key: POLAR_PRODUCT_ID_INVOICEFOLLOW_PRO
        sync: false
      - key: POLAR_PRODUCT_ID_PRICETRACKR_PRO
        sync: false
      - key: POLAR_PRODUCT_ID_WEBHOOKMONITOR_PRO
        sync: false
      - key: POLAR_PRODUCT_ID_FEEDBACKLENS_PRO
        sync: false
      - key: POLAR_PRODUCT_ID_FILECLEANER_TEAM
        sync: false
      - key: POLAR_PRODUCT_ID_INVOICEFOLLOW_TEAM
        sync: false
      - key: POLAR_PRODUCT_ID_PRICETRACKR_TEAM
        sync: false
      - key: POLAR_PRODUCT_ID_WEBHOOKMONITOR_TEAM
        sync: false
      - key: POLAR_PRODUCT_ID_FEEDBACKLENS_TEAM
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        sync: false
      - key: FEEDBACKLENS_TWITTER_REDIRECT_URI
        sync: false
      - key: FEEDBACKLENS_REDDIT_REDIRECT_URI
        sync: false
      - key: FEEDBACKLENS_GITHUB_REDIRECT_URI
        sync: false
      - key: FEEDBACKLENS_ANALYSIS_ENGINE
        sync: false
      - key: FEEDBACKLENS_SENTIMENT_MODEL
        sync: false
      - key: FEEDBACKLENS_URGENCY_MODEL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
