services:
  - type: web
    name: devforge-universal-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=packages:. uvicorn backend_core.universal_main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromConfig: DATABASE_URL
      - key: JWT_SECRET
        fromConfig: JWT_SECRET
      - key: STRIPE_SECRET_KEY
        fromConfig: STRIPE_SECRET_KEY
      - key: STRIPE_WEBHOOK_SECRET
        fromConfig: STRIPE_WEBHOOK_SECRET
      - key: FRONTEND_URL
        fromConfig: FRONTEND_URL
      - key: SMTP_HOST
        fromConfig: SMTP_HOST
      - key: SMTP_PORT
        fromConfig: SMTP_PORT
      - key: SMTP_USER
        fromConfig: SMTP_USER
      - key: SMTP_PASSWORD
        fromConfig: SMTP_PASSWORD
      - key: SMTP_FROM
        fromConfig: SMTP_FROM
      - key: GEMINI_API_KEY
        fromConfig: GEMINI_API_KEY
      - key: S3_ENDPOINT_URL
        fromConfig: S3_ENDPOINT_URL
      - key: S3_ACCESS_KEY_ID
        fromConfig: S3_ACCESS_KEY_ID
      - key: S3_SECRET_ACCESS_KEY
        fromConfig: S3_SECRET_ACCESS_KEY
      - key: S3_BUCKET_NAME
        fromConfig: S3_BUCKET_NAME
